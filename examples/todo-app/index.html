<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vex Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; }

    /* Light theme */
    .app { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .app-header { text-align: center; margin-bottom: 24px; }
    .app-header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .app-header p  { color: #6b7280; margin-top: 4px; }
    .about-link    { color: #6366f1; font-size: 0.9rem; text-decoration: none; }

    /* Dark theme */
    .dark body, body:has(.dark) { background: #111827; color: #f9fafb; }
    .dark .app-header p { color: #9ca3af; }
    .dark .add-input, .dark .search-input, .dark .edit-input { background: #1f2937; border-color: #374151; color: #f9fafb; }
    .dark .todo-item { background: #1f2937; border-color: #374151; }
    .dark .todo-text { color: #f9fafb; }
    .dark .filter-btn { background: #1f2937; border-color: #374151; color: #d1d5db; }
    .dark .filter-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .dark .priority-select { background: #1f2937; border-color: #374151; color: #f9fafb; }

    /* Add form */
    .add-form   { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-input  { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color .2s; }
    .add-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.2); }
    .priority-select { padding: 10px 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; background: #fff; cursor: pointer; }
    .add-btn    { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    .add-btn:hover:not(:disabled) { background: #4f46e5; }
    .add-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Filter bar */
    .filter-bar  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .search-input { flex: 1; min-width: 120px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; outline: none; }
    .search-input:focus { border-color: #6366f1; }
    .filter-btns { display: flex; gap: 4px; }
    .filter-btn  { padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; transition: all .2s; }
    .filter-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
    .filter-btn:hover:not(.active) { border-color: #6366f1; color: #6366f1; }
    .clear-btn   { padding: 6px 12px; background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .clear-btn:hover { background: #fee2e2; }

    /* Todo list */
    .todo-list  { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .empty      { text-align: center; color: #9ca3af; padding: 32px; }
    .todo-item  { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; transition: border-color .2s, box-shadow .2s; }
    .todo-item:hover { border-color: #c7d2fe; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .todo-item.done .todo-text { text-decoration: line-through; color: #9ca3af; }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .todo-check { width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1; }
    .todo-text  { flex: 1; font-size: 1rem; color: #111827; cursor: text; }
    .edit-input { flex: 1; padding: 4px 8px; border: 1px solid #6366f1; border-radius: 4px; font-size: 1rem; outline: none; }
    .delete-btn { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; transition: color .2s, background .2s; }
    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    /* Theme toggle */
    .app-wrapper { position: relative; }
    .theme-toggle { position: fixed; top: 16px; right: 16px; padding: 8px 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 20px; cursor: pointer; font-size: 0.875rem; box-shadow: 0 2px 8px rgba(0,0,0,.1); z-index: 100; }

    /* About page */
    .about-page { max-width: 600px; margin: 40px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .about-page h2 { font-size: 1.8rem; color: #4f46e5; margin-bottom: 16px; }
    .about-page p  { color: #374151; margin-bottom: 8px; }
    .about-page ul { margin: 16px 0; padding-left: 8px; list-style: none; }
    .about-page li { padding: 8px 0; color: #374151; border-bottom: 1px solid #f3f4f6; }
    .back-btn      { margin-top: 16px; padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    USAGE:
    1. Transpile App.vx:
       node ../../transpiler/vex.js src/App.vx -o src/App.js

    2. Open this file in a browser (or use a local server)

    OR use the pre-built App.js that ships with the repo.
  -->
  <script type="module">
    // In a real build this would be your bundler entry point.
    // For demo: we include the pre-transpiled App.js
    import App from './src/App.js';
    import { createRoot } from '../../packages/vex-core/index.js';
    createRoot(document.getElementById('root')).render(App());
  </script>
</body>
</html>
